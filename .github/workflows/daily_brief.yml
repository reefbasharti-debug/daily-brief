name: Daily Brief to Telegram

on:
  schedule:
      # 06:15 UTC = 09:15 Israel Summer Time (UTC+3)
          # Runs Sun-Thu (0=Sun, 1=Mon, 2=Tue, 3=Wed, 4=Thu in cron)
              - cron: "15 6 * * 0,1,2,3,4"
                workflow_dispatch:  # Allow manual trigger from GitHub UI

                jobs:
                  send-brief:
                      runs-on: ubuntu-latest
                          timeout-minutes: 5

                              steps:
                                    - name: Checkout code
                                            uses: actions/checkout@v4

                                                  - name: Set up Python
                                                          uses: actions/setup-python@v5
                                                                  with:
                                                                            python-version: "3.11"

                                                                                  - name: Install dependencies
                                                                                          run: pip install yfinance requests pytz

                                                                                                - name: Send daily brief
                                                                                                        env:
                                                                                                                  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
                                                                                                                            TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
                                                                                                                                    run: python github_brief.py
